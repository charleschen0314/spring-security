  <body>
    <h2 class="title">
      這是使用 OAuth 2.0 向 Keycloak 取得 access_token 的 demo 頁面
    </h2>
    <hr>

    <h3>1. 點擊 url，跳轉到 Keycloak 的授權頁面，開始 OAuth 2.0 的流程</h3>
    <a class="show-url" href="http://localhost:5500/realms/master/protocol/openid-connect/auth?response_type=code&client_id=my-test-client&scope=openid+profile+email&redirect_uri=http://localhost:3000/microservice-demo.html"></a>
    
    <h3>2. 取得 url 中返回的 code 的值，使用 Postman 請求 Keycloak，完成 OAuth 2.0 的授權流程</h3>
    <a href="https://semalt.tools/en/url-parser" target="_blank">URL 解析工具</a>
